<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product - ShoeHub</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">ShoeHub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="card p-4 shadow-sm border-0 mx-auto" style="max-width: 700px;">
            <h2 class="text-center mb-4 fw-bold">Add New Product</h2>
            <div id="alertBox"></div>
            <form id="addProductForm">
                <div class="mb-3">
                    <label class="form-label">Name:</label>
                    <input type="text" id="name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Brand:</label>
                    <input type="text" id="brand" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description:</label>
                    <textarea id="description" class="form-control" required></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Material:</label>
                    <input type="text" id="material" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Sizes Available (comma-separated):</label>
                    <input type="text" id="size_available" class="form-control" placeholder="e.g. 7, 8, 9, 10" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Color:</label>
                    <input type="text" id="color" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Gender:</label>
                    <select id="gender" class="form-select" required>
                        <option value="Men">Men</option>
                        <option value="Women">Women</option>
                        <option value="Unisex">Unisex</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Stock:</label>
                    <input type="number" id="stock" class="form-control" value="50" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Price (RS):</label>
                    <input type="number" step="0.01" id="price" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Ratings (1.0 - 5.0):</label>
                    <input type="number" step="0.1" id="ratings" class="form-control" value="4.5" min="1" max="5" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Reviews Count:</label>
                    <input type="number" id="reviews" class="form-control" value="10" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Image URL / Path:</label>
                    <input type="text" id="image_url" class="form-control" placeholder="e.g. images/Air Max 270 (Nike).avif" required>
                </div>
                <div class="text-center mt-4">
                    <button type="submit" id="submitBtn" class="btn btn-primary btn-lg w-100">Add Product</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="bg-dark text-white py-5 mt-5">
        <div class="container">
            <div class="row text-center">
                <div class="col-md-4">
                    <h5>ShoeHub</h5>
                    <p>Your one-stop destination for premium footwear.</p>
                </div>
                <div class="col-md-4">
                    <h5>Quick Links</h5>
                    <ul class="list-unstyled">
                        <li><a href="index.html" class="text-white text-decoration-none">Home</a></li>
                        <li><a href="cart.html" class="text-white text-decoration-none">Cart</a></li>
                        <li><a href="about.html" class="text-white text-decoration-none">About Us</a></li>
                        <li><a href="contact.html" class="text-white text-decoration-none">Contact</a></li>
                        <li><a href="products.html" class="text-white text-decoration-none">Products</a></li>
                    </ul>
                </div>
                <div class="col-md-4">
                    <h5>Follow Us</h5>
                    <a href="#" class="mx-2"><i class="fa-brands fa-facebook fa-2x" style="color: white !important;"></i></a>
                    <a href="#" class="mx-2"><i class="fa-brands fa-twitter fa-2x" style="color: white !important;"></i></a>
                    <a href="#" class="mx-2"><i class="fa-brands fa-instagram fa-2x" style="color: white !important;"></i></a>
                    <a href="#" class="mx-2"><i class="fa-brands fa-linkedin fa-2x" style="color: white !important;"></i></a>
                </div>
            </div>
            <hr class="bg-light">
            <div class="text-center mt-3">
                <p>&copy; 2025 ShoeHub. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js"></script>
    <script>
        document.getElementById('addProductForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertBox = document.getElementById('alertBox');
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;

            const newProduct = {
                name: document.getElementById('name').value,
                brand: document.getElementById('brand').value,
                description: document.getElementById('description').value,
                material: document.getElementById('material').value,
                size_available: document.getElementById('size_available').value,
                color: document.getElementById('color').value,
                gender: document.getElementById('gender').value,
                stock: parseInt(document.getElementById('stock').value),
                price: parseFloat(document.getElementById('price').value),
                ratings: parseFloat(document.getElementById('ratings').value),
                reviews: parseInt(document.getElementById('reviews').value),
                image_url: document.getElementById('image_url').value
            };

            if (supabaseClient) {
                try {
                    const { error } = await supabaseClient.from('products').insert([newProduct]);
                    if (error) throw error;
                } catch (err) {
                    console.log('Add product error:', err);
                }
            }

            // Also push to sample array in local memory
            SAMPLE_PRODUCTS.push({ ...newProduct, id: Date.now() });

            alertBox.innerHTML = `<div class="alert alert-success">New product added successfully!</div>`;
            document.getElementById('addProductForm').reset();
            btn.disabled = false;
        });
    </script>
</body>
</html>
