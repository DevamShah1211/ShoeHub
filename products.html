<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShoeHub - Products</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">ShoeHub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="products.html">Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cart.html">Cart</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">About Us</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact</a>
                    </li>
                    <li class="nav-item ms-lg-2">
                        <a class="btn btn-outline-light btn-sm mt-1 mt-lg-0" href="productadd.html">+ Add Product</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <h1 class="text-center mb-5 fw-bold">Our Products</h1>
        <div class="row g-4" id="productsGrid">
            <div class="text-center py-5">
                <div class="spinner-border text-dark" role="status">
                    <span class="visually-hidden">Loading products...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals Container -->
    <div id="modalsContainer"></div>

    <footer class="bg-dark text-white py-5">
        <div class="container">
            <div class="row text-center">
                <div class="col-md-4">
                    <h5>ShoeHub</h5>
                    <p>Your one-stop destination for premium footwear.</p>
                </div>
                <div class="col-md-4">
                    <h5>Quick Links</h5>
                    <ul class="list-unstyled">
                        <li><a href="index.html" class="text-white text-decoration-none">Home</a></li>
                        <li><a href="cart.html" class="text-white text-decoration-none">Cart</a></li>
                        <li><a href="about.html" class="text-white text-decoration-none">About Us</a></li>
                        <li><a href="contact.html" class="text-white text-decoration-none">Contact</a></li>
                        <li><a href="products.html" class="text-white text-decoration-none">Products</a></li>
                    </ul>
                </div>
                <div class="col-md-4">
                    <h5>Follow Us</h5>
                    <a href="#" class="mx-2"><i class="fa-brands fa-facebook fa-2x" style="color: white !important;"></i></a>
                    <a href="#" class="mx-2"><i class="fa-brands fa-twitter fa-2x" style="color: white !important;"></i></a>
                    <a href="#" class="mx-2"><i class="fa-brands fa-instagram fa-2x" style="color: white !important;"></i></a>
                    <a href="#" class="mx-2"><i class="fa-brands fa-linkedin fa-2x" style="color: white !important;"></i></a>
                </div>
            </div>
            <hr class="bg-light">
            <div class="text-center mt-3">
                <p>&copy; 2025 ShoeHub. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js"></script>
    <script>
        let allProducts = [];

        async function loadProducts() {
            const grid = document.getElementById('productsGrid');
            const modalsContainer = document.getElementById('modalsContainer');

            if (supabaseClient) {
                try {
                    const { data, error } = await supabaseClient
                        .from('products')
                        .select('*');

                    if (!error && data && data.length > 0) {
                        allProducts = data;
                    }
                } catch (e) {
                    console.log('Using sample products fallback');
                }
            }

            if (allProducts.length === 0) {
                allProducts = SAMPLE_PRODUCTS;
            }

            grid.innerHTML = allProducts.map(p => `
                <div class="col-md-4">
                    <div class="card product-card h-100 shadow-sm border-0"> 
                        <img src="${p.image_url}" class="card-img-top product-image" alt="${p.name}">
                        <div class="card-body d-flex flex-column justify-content-between">
                            <div>
                                <h5 class="card-title fw-bold">${p.name} (${p.brand})</h5>
                                <p class="price mb-2 text-primary fw-bold">RS ${Number(p.price).toFixed(2)}</p>
                                <p class="mb-3"><strong>Rating:</strong> ⭐ ${p.ratings}/5</p>
                            </div>
                            <button class="btn btn-dark w-100" data-bs-toggle="modal"
                                data-bs-target="#productModal${p.id}">View Details</button>
                        </div>
                    </div>
                </div>
            `).join('');

            modalsContainer.innerHTML = allProducts.map(p => `
                <div class="modal fade" id="productModal${p.id}" tabindex="-1"
                    aria-labelledby="productModalLabel${p.id}" aria-hidden="true">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title fw-bold" id="productModalLabel${p.id}">${p.name} (${p.brand})</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                            </div>
                            <div class="modal-body">
                                <img src="${p.image_url}" class="img-fluid rounded mb-3" alt="${p.name}">
                                <p>${p.description || ''}</p>
                                <p><strong>Material:</strong> ${p.material}</p>
                                <p><strong>Color:</strong> ${p.color}</p>
                                <p><strong>Sizes Available:</strong> ${p.size_available}</p>
                                <p><strong>Stock:</strong> ${p.stock}</p>
                                <p><strong>Price:</strong> RS ${Number(p.price).toFixed(2)}</p>
                                <p><strong>Rating:</strong> ⭐ ${p.ratings}/5</p>
                            </div>
                            <div class="modal-footer">
                                <button type="button" onclick="handleAddToCart(${p.id})" class="btn btn-success" data-bs-dismiss="modal">Add to Cart</button>
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function handleAddToCart(productId) {
            const product = allProducts.find(p => p.id == productId);
            if (product) {
                addToCart(product);
            }
        }

        document.addEventListener('DOMContentLoaded', loadProducts);
    </script>
</body>
</html>
